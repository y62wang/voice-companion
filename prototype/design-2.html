<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Voice Companion – Design 2 Minimal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .phone {
    width: 393px;
    height: 852px;
    background: #fff;
    border-radius: 54px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    font-size: 12px;
    font-weight: 600;
    color: #333;
  }
  .avatar-area {
    flex: 0 0 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #fafafa 0%, #fff 100%);
  }
  .orb-wrap {
    position: relative;
    width: 100px;
    height: 100px;
  }
  .orb {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    box-shadow: 0 8px 32px rgba(102,126,234,0.35);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(102,126,234,0.35); }
    50% { transform: scale(1.07); box-shadow: 0 12px 48px rgba(102,126,234,0.5); }
  }
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1.5px solid rgba(102,126,234,0.25);
    animation: expand 2.5s ease-out infinite;
  }
  .ring:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 100px; height: 100px; animation-delay: 0.8s; }
  @keyframes expand {
    0% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
    100% { transform: translate(-50%,-50%) scale(1.9); opacity: 0; }
  }
  .ai-name {
    margin-top: 14px;
    font-size: 19px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .ai-status {
    margin-top: 4px;
    font-size: 12px;
    color: #667eea;
    font-weight: 500;
  }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #fafafa;
  }
  .chat-area::-webkit-scrollbar { display: none; }
  .msg-group { display: flex; flex-direction: column; }
  .msg-group.user { align-items: flex-end; }
  .msg-group.ai { align-items: flex-start; }
  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.ai {
    background: #fff;
    color: #1a1a2e;
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
  }
  .msg.user {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border-bottom-right-radius: 5px;
  }
  .msg-time { font-size: 10px; color: #999; margin-top: 3px; }
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: #fff;
    border-radius: 20px;
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #667eea;
    animation: typingbounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingbounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }
  .input-area {
    padding: 12px 16px 32px;
    background: #fff;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f4f4f8;
    border-radius: 28px;
    padding: 8px 8px 8px 16px;
  }
  .text-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #1a1a2e;
    font-size: 15px;
    font-family: inherit;
  }
  .text-input::placeholder { color: #aaa; }
  .mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    flex-shrink: 0;
  }
  .mic-icon { width: 16px; height: 16px; fill: white; }
  .status-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
    font-size: 11px;
    color: #667eea;
    font-weight: 500;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #667eea;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="avatar-area">
    <div class="orb-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="orb"></div>
    </div>
    <div class="ai-name">Dandi</div>
    <div class="ai-status">● Online · Always listening</div>
  </div>
  <div class="chat-area">
    <div class="msg-group ai">
      <div class="msg ai">嘿~ 今天怎么样 =P</div>
      <div class="msg-time">8:30 PM</div>
    </div>
    <div class="msg-group user">
      <div class="msg user">还好，有点累，收拾了一天</div>
      <div class="msg-time">8:32 PM</div>
    </div>
    <div class="msg-group ai">
      <div class="msg ai">好好休息啊.. 腰记得拉伸一下 muah</div>
      <div class="msg-time">8:32 PM</div>
    </div>
    <div class="msg-group user">
      <div class="msg user">帮我查一下明天的天气</div>
      <div class="msg-time">8:45 PM</div>
    </div>
    <div class="msg-group ai">
      <div class="msg ai">Sammamish 明天 58°F，早上有雨，下午转晴。带件外套 =P</div>
      <div class="msg-time">8:45 PM</div>
    </div>
    <div class="msg-group user">
      <div class="msg user">今天包裹到了吗</div>
      <div class="msg-time">8:51 PM</div>
    </div>
    <div class="msg-group ai">
      <div class="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input class="text-input" type="text" placeholder="Ask Dandi anything...">
      <button class="mic-btn">
        <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21h2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
      </button>
    </div>
    <div class="status-pill"><div class="live-dot"></div>Listening in background</div>
  </div>
</div>
</body>
</html>
