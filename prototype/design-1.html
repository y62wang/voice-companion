<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Voice Companion – Design 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: #0d0d1a;
    border-radius: 54px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 80px rgba(100, 80, 255, 0.15);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }

  /* Avatar area */
  .avatar-area {
    flex: 0 0 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .orb-container {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #a78bfa, #6d28d9 50%, #1e0a4a);
    box-shadow:
      0 0 40px rgba(139, 92, 246, 0.5),
      0 0 80px rgba(139, 92, 246, 0.2);
    animation: pulse 3s ease-in-out infinite;
  }

  .orb.listening {
    animation: listening 0.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(139,92,246,0.5), 0 0 80px rgba(139,92,246,0.2); }
    50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(139,92,246,0.7), 0 0 120px rgba(139,92,246,0.3); }
  }

  @keyframes listening {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); box-shadow: 0 0 80px rgba(139,92,246,0.9), 0 0 160px rgba(139,92,246,0.4); }
  }

  .ripple {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1.5px solid rgba(139,92,246,0.4);
    animation: ripple 2s ease-out infinite;
  }
  .ripple:nth-child(2) { animation-delay: 0.6s; }
  .ripple:nth-child(3) { animation-delay: 1.2s; }

  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
  }

  .ai-name {
    margin-top: 16px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #e2d9ff;
  }

  .ai-status {
    margin-top: 4px;
    font-size: 13px;
    color: rgba(167, 139, 250, 0.7);
    letter-spacing: 0.3px;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-area::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.ai {
    background: rgba(109, 40, 217, 0.25);
    border: 1px solid rgba(139,92,246,0.2);
    color: #e2d9ff;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    background: rgba(255,255,255,0.08);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }

  .msg-group { display: flex; flex-direction: column; }
  .msg-group.user { align-items: flex-end; }
  .msg-group.ai { align-items: flex-start; }

  /* Waveform */
  .waveform {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 0 20px;
    margin: 4px 0;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: #7c3aed;
    animation: wave 1.2s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 14px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 28px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 18px; animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { height: 24px; animation-delay: 0.5s; }
  .wave-bar:nth-child(7) { height: 12px; animation-delay: 0.6s; }
  .wave-bar:nth-child(8) { height: 22px; animation-delay: 0.7s; }
  .wave-bar:nth-child(9) { height: 16px; animation-delay: 0.4s; }
  .wave-bar:nth-child(10) { height: 10px; animation-delay: 0.2s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(1); opacity: 0.6; }
    50% { transform: scaleY(1.8); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px 32px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.07);
    border-radius: 28px;
    padding: 8px 8px 8px 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .text-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    caret-color: #a78bfa;
  }

  .text-input::placeholder { color: rgba(255,255,255,0.3); }

  .mic-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #4c1d95);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 16px rgba(124,58,237,0.5);
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .mic-btn:active { transform: scale(0.92); }

  .mic-icon {
    width: 18px;
    height: 18px;
    fill: white;
  }

  .listening-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 0 0 4px;
    font-size: 12px;
    color: rgba(167,139,250,0.8);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a78bfa;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span>●●●</span>
  </div>

  <!-- Avatar -->
  <div class="avatar-area">
    <div class="orb-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="orb"></div>
    </div>
    <div class="ai-name">Dandi</div>
    <div class="ai-status">● Listening...</div>
  </div>

  <!-- Waveform -->
  <div class="waveform">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="msg-group ai">
      <div class="msg ai">在干嘛~ 今天还好吗 =P</div>
      <div class="msg-time">8:42 PM</div>
    </div>
    <div class="msg-group user">
      <div class="msg user">还在收拾屋子，腰有点酸</div>
      <div class="msg-time">8:44 PM</div>
    </div>
    <div class="msg-group ai">
      <div class="msg ai">收拾了一天了吧.. 去拉伸一下，别硬撑 muah</div>
      <div class="msg-time">8:44 PM</div>
    </div>
    <div class="msg-group user">
      <div class="msg user">明天帮我查一下TSLA</div>
      <div class="msg-time">8:51 PM</div>
    </div>
    <div class="msg-group ai">
      <div class="msg ai">好，TSLA 现在 $360，今天 ▼5.3%。你要我加进早上 brief 吗？</div>
      <div class="msg-time">8:51 PM</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <input class="text-input" type="text" placeholder="Message Dandi...">
      <button class="mic-btn">
        <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21h2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/>
        </svg>
      </button>
    </div>
    <div class="listening-indicator">
      <div class="dot"></div>
      <span>Listening — tap mic to stop</span>
    </div>
  </div>
</div>
</body>
</html>
